name: Run ITVlist Script

on:
  schedule:
    - cron: "0 9,21 * * *"
  workflow_dispatch:

jobs:
  run-itvlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp requests

      - name: Run ITVlist script
        run: |
          echo "=== Starting ITVlist.py ==="
          python ITVlist.py
          echo "=== Finished ITVlist.py ==="
          
      - name: Speed test CCTV1 and filter fastest sources
        run: |
          echo "=== 开始测速 CCTV1 ==="

          input="itvlist.txt"
          tmp_cctv1="cctv1_all.txt"
          tmp_speed="cctv1_speed.txt"
          output="itvlist_filtered.txt"

          rm -f "$tmp_cctv1" "$tmp_speed" "$output"
          touch "$tmp_cctv1" "$tmp_speed" "$output"

          # ① 提取所有 CCTV1 行
          grep "^CCTV1," "$input" > "$tmp_cctv1"

          if [ ! -s "$tmp_cctv1" ]; then
            echo "没有 CCTV1，跳过测速"
            cp "$input" "$output"
            mv "$output" itvlist.txt
            exit 0
          fi

          # ② 对每条 CCTV1 进行测速
          while IFS= read -r line; do
            url=$(echo "$line" | cut -d',' -f2)
            host=$(echo "$url" | sed -E 's#https?://([^/:]+).*#\1#')

            echo "测速：$url"

            speed=$(curl -o /dev/null --max-time 5 -w "%{speed_download}" "$url" 2>/dev/null || echo "0")
            speed_int=${speed%.*}

            echo "$speed_int $host $url" >> "$tmp_speed"

          done < "$tmp_cctv1"

          # ③ 选出最快的 3 条
          top3=$(sort -nr "$tmp_speed" | head -n 3)

          echo "=== 最快的 3 条源 ==="
          echo "$top3"

          # ④ 提取这 3 条源的服务器 host
          echo "$top3" | awk '{print $2}' | sort -u > keep_hosts.txt

          echo "=== 保留的服务器 ==="
          cat keep_hosts.txt

          # ⑤ 根据服务器 host 保留所有频道
          while IFS= read -r line; do
            url=$(echo "$line" | cut -d',' -f2)
            host=$(echo "$url" | sed -E 's#https?://([^/:]+).*#\1#')

            if grep -Fxq "$host" keep_hosts.txt; then
              echo "$line" >> "$output"
            fi
          done < "$input"

          mv "$output" itvlist.txt

          echo "=== 处理完成，已根据最快 3 条 CCTV1 源过滤 itvlist.txt ==="


      - name: Commit and push results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add itvlist.txt
          git commit -m "自定更新： itvlist.txt" || echo "No changes"
          git push --force
