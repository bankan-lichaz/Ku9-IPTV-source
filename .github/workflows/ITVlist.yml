name: Run ITVlist Script

on:
  schedule:
    - cron: "0 9,21 * * *"
  workflow_dispatch:

jobs:
  run-itvlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp requests

      - name: Run ITVlist script
        run: |
          echo "=== Starting ITVlist.py ==="
          python ITVlist.py
          echo "=== Finished ITVlist.py ==="

      - name: Encrypt itvlist.txt (single-line, same as web encryptor)
        run: |
          echo "开始加密 itvlist.txt..."

          node - << 'EOF'
          const fs = require("fs");

          const key = "test";                         // 你网页里用的那个 key
          const content = fs.readFileSync("itvlist.txt", "utf8");

          // 完全模拟网页：TextEncoder + Base64
          const encoder = new TextEncoder();
          const bytes = encoder.encode(key + content);

          let binary = "";
          for (const b of bytes) {
            binary += String.fromCharCode(b);
          }

          const encoded = Buffer.from(binary, "binary").toString("base64");

          // ⭐ 只写一行，没有换行，没有空格
          fs.writeFileSync("itvlist.txt", encoded.trim(), { encoding: "utf8" });
          EOF

          echo "加密完成（单行 Base64）"



      - name: Commit and push results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add itvlist.txt
          git commit -m "自定更新： itvlist.txt" || echo "No changes"
          git push --force
