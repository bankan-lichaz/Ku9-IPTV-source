name: Run ITVlist Script

on:
  schedule:
    - cron: "0 9,21 * * *"
  workflow_dispatch:

jobs:
  run-itvlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp requests

      - name: Run ITVlist script
        run: |
          echo "=== Starting ITVlist.py ==="
          python ITVlist.py
          echo "=== Finished ITVlist.py ==="

      - name: Remove first line of itvlist.txt
        run: |
          sed -i '1d' itvlist.txt

      - name: Encrypt itvlist.txt (Base64 with key prefix)
        run: |
          echo "开始加密 itvlist.txt..."

          key="test"
          input="itvlist.txt"
          output="itvlist_encrypted.txt"

          rm -f "$output"
          touch "$output"

          combined=$(printf "%s%s" "$key" "$(cat "$input")")
          encoded=$(printf "%s" "$combined" | base64)

          printf "%s" "$encoded" > "$output"

          mv "$output" itvlist.txt

          echo "加密完成"


      - name: Commit and push results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add itvlist.txt
          git commit -m "自定更新： itvlist.txt" || echo "No changes"
          git push --force
