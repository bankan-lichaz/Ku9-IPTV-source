name: Run ITVlist Script

on:
  schedule:
    - cron: "0 9,21 * * *"
  workflow_dispatch:

jobs:
  run-itvlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp requests

      - name: Run ITVlist script
        run: |
          echo "=== Starting ITVlist.py ==="
          python ITVlist.py
          echo "=== Finished ITVlist.py ==="

      - name: Encrypt itvlist.txt (same logic as encrypt.html)
        run: |
          echo "开始加密 itvlist.txt..."

          key="test"
          input="itvlist.txt"
          output="itvlist_encrypted.txt"

          # 读取原文
          content=$(cat "$input")

          # ⭐ 使用 Node.js 执行网页同款加密逻辑
          node - << 'EOF'
          const fs = require("fs");

          const key = "test";
          const content = fs.readFileSync("itvlist.txt", "utf8");

          // 完全复刻 encrypt.html 的逻辑
          const encoder = new TextEncoder();
          const bytes = encoder.encode(key + content);

          let binary = "";
          bytes.forEach(b => binary += String.fromCharCode(b));

          const encoded = Buffer.from(binary, "binary").toString("base64");

          fs.writeFileSync("itvlist_encrypted.txt", encoded);
          EOF

          mv itvlist_encrypted.txt itvlist.txt

          echo "加密完成（与 encrypt.html 完全一致）"


      - name: Commit and push results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add itvlist.txt
          git commit -m "自定更新： itvlist.txt" || echo "No changes"
          git push --force
