name: Run ITVlist Script

on:
  schedule:
    - cron: "0 9,21 * * *"
  workflow_dispatch:

jobs:
  run-itvlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp requests

      - name: Run ITVlist script
        run: |
          echo "=== Starting ITVlist.py ==="
          python ITVlist.py
          echo "=== Finished ITVlist.py ==="
          
      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Detect real resolution + speed test + keep fastest 3 true 1080p
        run: |
          echo "=== 开始真实分辨率识别 + 5 秒测速 ==="

          input="itvlist.txt"
          tmp_cctv1="cctv1_all.txt"
          tmp_hd="cctv1_real1080.txt"
          tmp_speed="cctv1_speed.txt"
          output="itvlist_filtered.txt"

          rm -f "$tmp_cctv1" "$tmp_hd" "$tmp_speed" "$output"
          touch "$tmp_cctv1" "$tmp_hd" "$tmp_speed" "$output"

          # ① 提取所有 CCTV1 行
          grep "^CCTV1," "$input" > "$tmp_cctv1"

          # ② 真实解码 1 秒，识别分辨率
          while IFS= read -r line; do
            url=$(echo "$line" | cut -d',' -f2)

            res=$(ffmpeg -i "$url" -t 1 -vf scale -f null - 2>&1 | grep -oE '[0-9]{3,4}x[0-9]{3,4}' | head -n 1)

            echo "URL: $url 分辨率: $res"

            if [ "$res" = "1920x1080" ]; then
              echo "$line" >> "$tmp_hd"
            fi
          done < "$tmp_cctv1"

          echo "=== 真实 1080p 数量 ==="
          wc -l "$tmp_hd"

          if [ ! -s "$tmp_hd" ]; then
            echo "没有真实 1080p CCTV1，跳过筛选"
            cp "$input" "$output"
            mv "$output" itvlist.txt
            exit 0
          fi

          # ③ 对真实 1080p CCTV1 进行 5 秒拉流测速
          while IFS= read -r line; do
            url=$(echo "$line" | cut -d',' -f2)
            host=$(echo "$url" | sed -E 's#https?://([^/:]+).*#\1#')

            tmpfile="/tmp/test_${host}.bin"
            rm -f "$tmpfile"

            curl -o "$tmpfile" --max-time 5 "$url" 2>/dev/null || true
            bytes=$(stat -c%s "$tmpfile" 2>/dev/null || echo "0")

            echo "$bytes $host $url" >> "$tmp_speed"
          done < "$tmp_hd"

          # ④ 选出最快的 3 条
          top3=$(sort -nr "$tmp_speed" | head -n 3)

          echo "$top3" | awk '{print $2}' | sort -u > keep_hosts.txt

          # ⑤ 保留这些服务器的所有频道
          while IFS= read -r line; do
            url=$(echo "$line" | cut -d',' -f2)
            host=$(echo "$url" | sed -E 's#https?://([^/:]+).*#\1#')

            if grep -Fxq "$host" keep_hosts.txt; then
              echo "$line" >> "$output"
            fi
          done < "$input"

          mv "$output" itvlist.txt

          echo "=== 处理完成：已筛选真正的 1080p CCTV1 并保留其服务器所有频道 ==="

      - name: Commit and push results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add itvlist.txt
          git commit -m "自定更新： itvlist.txt" || echo "No changes"
          git push --force
