name: Run ITVlist Script

on:
  schedule:
    - cron: "0 9,21 * * *"
  workflow_dispatch:

jobs:
  run-itvlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp requests

      - name: Run ITVlist script
        run: |
          echo "=== Starting ITVlist.py ==="
          python ITVlist.py
          echo "=== Finished ITVlist.py ==="
          
      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Speed test ONLY 1920x1080 CCTV1 and keep fastest 3 hosts
        run: |
          echo "=== 开始筛选真正的 1920x1080 CCTV1 ==="

          input="itvlist.txt"
          tmp_cctv1="cctv1_all.txt"
          tmp_hd="cctv1_hd.txt"
          tmp_speed="cctv1_speed.txt"
          output="itvlist_filtered.txt"

          rm -f "$tmp_cctv1" "$tmp_hd" "$tmp_speed" "$output"
          touch "$tmp_cctv1" "$tmp_hd" "$tmp_speed" "$output"

          # ① 提取所有 CCTV1 行
          grep "^CCTV1," "$input" > "$tmp_cctv1"

          if [ ! -s "$tmp_cctv1" ]; then
            echo "没有 CCTV1，跳过筛选"
            cp "$input" "$output"
            mv "$output" itvlist.txt
            exit 0
          fi

          # ② 使用 ffprobe 过滤出真正的 1920x1080 源
          sudo apt-get update
          sudo apt-get install -y ffmpeg jq

          while IFS= read -r line; do
            url=$(echo "$line" | cut -d',' -f2)

            info=$(ffprobe -v quiet -print_format json -show_streams "$url" 2>/dev/null)

            width=$(echo "$info" | jq -r '.streams[0].width // 0')
            height=$(echo "$info" | jq -r '.streams[0].height // 0')

            if [ "$width" -eq 1920 ] && [ "$height" -eq 1080 ]; then
              echo "$line" >> "$tmp_hd"
            fi
          done < "$tmp_cctv1"

          echo "=== 真实 1920x1080 源数量 ==="
          wc -l "$tmp_hd"

          if [ ! -s "$tmp_hd" ]; then
            echo "没有真实 1080p CCTV1，跳过测速"
            cp "$input" "$output"
            mv "$output" itvlist.txt
            exit 0
          fi

          # ③ 对 1080p CCTV1 进行 5 秒真实拉流测速
          while IFS= read -r line; do
            url=$(echo "$line" | cut -d',' -f2)
            host=$(echo "$url" | sed -E 's#https?://([^/:]+).*#\1#')

            echo "测速：$url"

            tmpfile="/tmp/test_${host}.bin"
            rm -f "$tmpfile"

            curl -o "$tmpfile" --max-time 5 "$url" 2>/dev/null || true
            bytes=$(stat -c%s "$tmpfile" 2>/dev/null || echo "0")

            echo "$bytes $host $url" >> "$tmp_speed"
          done < "$tmp_hd"

          # ④ 选出下载量最大的 3 条（最稳定的 1080p）
          top3=$(sort -nr "$tmp_speed" | head -n 3)

          echo "=== 最稳定的 3 条 1080p CCTV1 ==="
          echo "$top3"

          # ⑤ 提取这 3 条源的服务器 host
          echo "$top3" | awk '{print $2}' | sort -u > keep_hosts.txt

          echo "=== 保留的服务器 ==="
          cat keep_hosts.txt

          # ⑥ 保留所有来自这些服务器的频道
          while IFS= read -r line; do
            url=$(echo "$line" | cut -d',' -f2)
            host=$(echo "$url" | sed -E 's#https?://([^/:]+).*#\1#')

            if grep -Fxq "$host" keep_hosts.txt; then
              echo "$line" >> "$output"
            fi
          done < "$input"

          mv "$output" itvlist.txt

          echo "=== 处理完成：已筛选真正的 1080p CCTV1 并保留其服务器所有频道 ==="

      - name: Commit and push results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add itvlist.txt
          git commit -m "自定更新： itvlist.txt" || echo "No changes"
          git push --force
