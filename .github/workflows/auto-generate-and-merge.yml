name: Generate table.txt and Merge IPTV by Province

on:
  schedule:
    - cron: "0 0,7 * * *"   # 每天北京时间 08:00 15:00
  workflow_dispatch:

jobs:
  auto:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Clone target repo
        run: |
          git clone https://github.com/q1017673817/iptvz target_repo

      - name: Generate table.txt (only 组播 files)
        run: |
          echo "生成 table.txt..."
          rm -f table.txt
          touch table.txt

          cd target_repo

          for file in 组播*.txt; do
            ts=$(git log -1 --format=%ct -- "$file")
            now=$(date +%s)
            diff=$(( (now - ts) / 86400 ))

            if [ "$diff" -lt 1 ]; then
              human="yesterday"
            elif [ "$diff" -lt 2 ]; then
              human="2 days ago"
            elif [ "$diff" -lt 3 ]; then
              human="3 days ago"
            elif [ "$diff" -lt 4 ]; then
              human="4 days ago"
            else
              human="${diff} days ago"
            fi

            echo "$file" >> ../table.txt
            echo "更新组播源" >> ../table.txt
            echo "$human" >> ../table.txt
            echo "" >> ../table.txt
          done

      - name: Filter files ≤4 days
        run: |
          rm -f filtered.txt
          touch filtered.txt

          awk '
            NR%4==1 {name=$0}
            NR%4==3 {
              time=$0
              if (time ~ /hours ago/ || time ~ /yesterday/ || time ~ /days ago/ && time+0 <= 4) {
                print name
              }
            }
          ' table.txt > filtered.txt

      - name: Merge IPTV by Province
        run: |
          echo "生成按省分类的 merged_province.txt..."
          rm -f merged_province.txt
          touch merged_province.txt

          cd target_repo

          rm -f ../tmp_merge.txt

          while IFS= read -r file; do
            province=$(echo "$file" | sed 's/组播_//; s/电信.txt//; s/联通.txt//; s/移动.txt//')

            while IFS= read -r url; do
              [ -z "$url" ] && continue
              echo "$province|$url" >> ../tmp_merge.txt
            done < "$file"

          done < ../filtered.txt

          for p in $(cut -d '|' -f1 ../tmp_merge.txt | sort -u); do
            echo "${p}组播,#genre#" >> ../merged_province.txt
            grep "^$p|" ../tmp_merge.txt | while IFS='|' read -r prov url; do
              echo "${url}" >> ../merged_province.txt
            done
            echo "" >> ../merged_province.txt
          done

      - name: Post-process merged_province.txt (append group name & remove group headers)
        run: |
          echo "处理 merged_province.txt..."

          tmp_out="merged_final.txt"
          rm -f "$tmp_out"
          touch "$tmp_out"

          current_group=""

          while IFS= read -r line; do

            if echo "$line" | grep -qE "组播[0-9]+,#genre#"; then
              current_group=$(echo "$line" | sed 's/,#genre#//')
              continue
            fi

            if echo "$line" | grep -q "#genre#"; then
              echo "$line" >> "$tmp_out"
              continue
            fi

            if [ -z "$line" ]; then
              echo "" >> "$tmp_out"
              continue
            fi

            if [ -n "$current_group" ]; then
              echo "${line}\$${current_group}" >> "$tmp_out"
            else
              echo "$line" >> "$tmp_out"
            fi

          done < merged_province.txt

          mv "$tmp_out" merged_province.txt

      ###########################################################################
      # ★★★ 新增步骤：按 CCTV‑1综合 测速并删除同源所有频道（稳定版） ★★★
      ###########################################################################
      - name: Speed test & filter unstable sources based on CCTV-1综合
        run: |
          echo "开始按 CCTV-1综合 测速并过滤源..."

          input="merged_province.txt"
          output="merged_province_filtered.txt"
          rm -f "$output"
          touch "$output"

          declare -A source_keep

          grep "^CCTV-1综合," "$input" > cctv1_list.txt || true

          if [ ! -s cctv1_list.txt ]; then
            echo "没有 CCTV-1综合，跳过测速"
            cp "$input" "$output"
            mv "$output" merged_province.txt
            exit 0
          fi

          awk -F'\$' '{print $2}' cctv1_list.txt | sort -u > source_list.txt

          while read -r src; do
            echo "测试源：$src"

            url=$(grep "\$${src}$" cctv1_list.txt | head -n 1 | cut -d',' -f2 | cut -d'$' -f1)

            echo "测速 URL: $url"

            # ① 瞬时速度测试（不会失败）
            speed1=$(curl -o /dev/null --max-time 5 -w "%{speed_download}" "$url" 2>/dev/null || echo "0")
            echo "瞬时速度：$speed1 bytes/s"

            # ② 持续拉流测试（不会 exit 28）
            tmpfile="/tmp/test_${src}.bin"
            rm -f "$tmpfile"

            curl -o "$tmpfile" --max-time 5 "$url" 2>/dev/null || true

            bytes=$(stat -c%s "$tmpfile" 2>/dev/null || echo "0")
            echo "持续拉流 5 秒下载字节数：$bytes"

            threshold=$((1024*1024))  # 1MB

            if [ "${speed1%.*}" -gt "$threshold" ] && [ "$bytes" -gt "$threshold" ]; then
              echo "源 $src 速度合格且持续稳定 → 保留该源所有频道"
              source_keep["$src"]=1
            else
              echo "源 $src 不稳定或速度不足 → 删除该源所有频道"
              source_keep["$src"]=0
            fi

          done < source_list.txt

          while IFS= read -r line; do
            if ! echo "$line" | grep -q '\$'; then
              echo "$line" >> "$output"
              continue
            fi

            src=$(echo "$line" | awk -F'\$' '{print $2}')

            if [ "${source_keep[$src]}" = "1" ]; then
              echo "$line" >> "$output"
            fi

          done < "$input"

          mv "$output" merged_province.txt

      - name: Encrypt merged_province.txt (Base64 with key prefix)
        run: |
          echo "开始加密 merged_province.txt..."

          key="test"
          input="merged_province.txt"
          output="merged_province_encrypted.txt"

          rm -f "$output"
          touch "$output"

          # 将 key + 内容 → Base64
          combined=$(printf "%s%s" "$key" "$(cat "$input")")
          encoded=$(printf "%s" "$combined" | base64)

          # 写入加密后的文件
          printf "%s" "$encoded" > "$output"

          # 用加密后的文件替换原文件
          mv "$output" merged_province.txt

          echo "加密完成，输出为 Base64（带 key 前缀）"

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add table.txt merged_province.txt
          git commit -m "Auto generate table.txt & merge IPTV by province (with source speed filtering)"
          git push
