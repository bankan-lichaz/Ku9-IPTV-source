name: Generate table.txt and Final IPTV Output

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  auto:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Clone target repo
        run: |
          git clone https://github.com/q1017673817/iptvz target_repo

      - name: Generate table.txt (only 组播 files)
        run: |
          echo "生成 table.txt..."
          rm -f table.txt
          touch table.txt

          cd target_repo

          for file in 组播*.txt; do
            ts=$(git log -1 --format=%ct -- "$file")
            now=$(date +%s)
            diff=$(( (now - ts) / 86400 ))

            if [ "$diff" -lt 1 ]; then
              human="yesterday"
            elif [ "$diff" -lt 2 ]; then
              human="2 days ago"
            elif [ "$diff" -lt 3 ]; then
              human="3 days ago"
            elif [ "$diff" -lt 4 ]; then
              human="4 days ago"
            else
              human="${diff} days ago"
            fi

            echo "$file" >> ../table.txt
            echo "更新组播源" >> ../table.txt
            echo "$human" >> ../table.txt
            echo "" >> ../table.txt
          done

      - name: Filter files ≤4 days
        run: |
          rm -f filtered.txt
          touch filtered.txt

          awk '
            NR%4==1 {name=$0}
            NR%4==3 {
              time=$0
              if (time ~ /hours ago/ || time ~ /yesterday/ || time ~ /days ago/ && time+0 <= 4) {
                print name
              }
            }
          ' table.txt > filtered.txt

      - name: Merge IPTV (Worker-style final output)
        run: |
          echo "生成最终 IPTV 输出..."
          rm -f merged_province.txt tmp_merge.txt
          touch merged_province.txt

          cd target_repo

          while IFS= read -r file; do
            province=$(echo "$file" | sed 's/组播_//; s/电信.txt//; s/联通.txt//; s/移动.txt//')

            current_tag=""

            while IFS= read -r raw; do
              line=$(echo "$raw" | tr -d '\r' | sed 's/^[ \t]*//;s/[ \t]*$//')
              [ -z "$line" ] && continue

              # 去掉旧的 $运营商
              if echo "$line" | grep -q "\$"; then
                line=$(echo "$line" | cut -d'$' -f1)
              fi

              # 匹配标签行：必须包含 -组播号,#genre#
              if echo "$line" | grep -q "\-组播[0-9]\+,#genre#"; then
                current_tag=$(echo "$line" | sed 's/,#genre#//')
                echo "${province}|${line}" >> ../tmp_merge.txt
                continue
              fi

              # 匹配普通 genre 行（例如 北京频道,#genre#）
              if echo "$line" | grep -q ",#genre#$"; then
                echo "${province}|${line}" >> ../tmp_merge.txt
                continue
              fi

              # 匹配频道名 + URL 行
              if echo "$line" | grep -q ","; then
                name=$(echo "$line" | cut -d',' -f1)
                url=$(echo "$line" | cut -d',' -f2)

                if echo "$url" | grep -q "^http"; then
                  if [ -n "$current_tag" ]; then
                    echo "${province}|${name},${url}\$${current_tag}" >> ../tmp_merge.txt
                  else
                    echo "${province}|${name},${url}" >> ../tmp_merge.txt
                  fi
                fi
              fi

            done < "$file"

          done < ../filtered.txt

          # 按省输出最终文件
          for p in $(cut -d '|' -f1 ../tmp_merge.txt | sort -u); do
            echo "${p}频道,#genre#" >> ../merged_province.txt

            grep "^$p|" ../tmp_merge.txt | while IFS='|' read -r prov line; do
              echo "$line" >> ../merged_province.txt
            done

            echo "" >> ../merged_province.txt
          done

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add table.txt merged_province.txt
          git commit -m "Auto generate final IPTV output (Worker-style)"
          git push
