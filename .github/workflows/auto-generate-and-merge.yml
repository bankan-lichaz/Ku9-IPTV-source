      - name: Merge IPTV by Province
        run: |
          echo "生成按省分类的 merged_province.txt..."
          rm -f merged_province.txt
          touch merged_province.txt

          cd target_repo

          rm -f ../tmp_merge.txt

          while IFS= read -r file; do
            # 去掉运营商字段，只保留省份
            province=$(echo "$file" | sed 's/组播_//; s/电信.txt//; s/联通.txt//; s/移动.txt//')

            while IFS= read -r url; do
              [ -z "$url" ] && continue
              # 只写入省份 + URL，不再写入 carrier
              echo "$province|$url" >> ../tmp_merge.txt
            done < "$file"

          done < ../filtered.txt

          for p in $(cut -d '|' -f1 ../tmp_merge.txt | sort -u); do
            echo "${p}频道,#genre#" >> ../merged_province.txt
            grep "^$p|" ../tmp_merge.txt | while IFS='|' read -r prov url; do
              echo "${url}" >> ../merged_province.txt
            done
            echo "" >> ../merged_province.txt
          done
