name: Generate table.txt (stable version)

on:
  schedule:
    - cron: "0 18 * * *"   # 每天北京时间 02:00
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Clone target repo
        run: |
          git clone https://github.com/q1017673817/iptvz target_repo

      - name: Generate table.txt
        run: |
          echo "生成 table.txt..."
          rm -f table.txt
          touch table.txt

          cd target_repo

          # 只处理文件名中带“组播”的 txt 文件
          for file in 组播*.txt; do
            echo "处理 $file"

            ts=$(git log -1 --format=%ct -- "$file")
            now=$(date +%s)
            diff=$(( (now - ts) / 86400 ))

            if [ "$diff" -lt 1 ]; then
              human="yesterday"
            elif [ "$diff" -lt 2 ]; then
              human="2 days ago"
            elif [ "$diff" -lt 3 ]; then
              human="3 days ago"
            elif [ "$diff" -lt 4 ]; then
              human="4 days ago"
            else
              human="${diff} days ago"
            fi

            echo "$file" >> ../table.txt
            echo "更新组播源" >> ../table.txt
            echo "$human" >> ../table.txt
            echo "" >> ../table.txt
          done

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add table.txt
          git commit -m "Auto update table.txt (only 组播 files)"
          git push
