name: Merge Remote Multicast TXT

on:
  schedule:
    - cron: "0 */6 * * *"   # 每 6 小时运行一次
  workflow_dispatch:

jobs:
  merge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download target repo file list
        run: |
          mkdir remote

          # 下载目标仓库文件列表（API）
          curl -L "https://api.github.com/repos/q1017673817/iptvz/contents" -o remote/list.json

      - name: Download all txt files containing '组播'
        run: |
          mkdir remote/files

          # 解析 JSON，找出包含“组播”的 txt 文件
          for url in $(jq -r '.[] | select(.name | contains("组播")) | select(.name | endswith(".txt")) | .download_url' remote/list.json); do
            echo "Downloading: $url"
            fname=$(basename "$url")
            curl -L "$url" -o "remote/files/$fname"
          done

      - name: Merge downloaded files
        run: |
          mkdir -p output
          > output/recent.txt

          for f in remote/files/*.txt; do
            echo "==== 来自文件: $f ====" >> output/recent.txt
            cat "$f" >> output/recent.txt
            echo "" >> output/recent.txt
          done

      - name: Push to auto-output branch
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git checkout -B auto-output

          git add output/recent.txt

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update recent.txt from q1017673817/iptvz"
          git remote set-url origin https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.git
          git push -f origin auto-output
