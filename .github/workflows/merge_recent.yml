name: Merge Based on Manual Table in Main Root

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  merge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main (for table.txt)
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      - name: Checkout auto-output branch
        uses: actions/checkout@v4
        with:
          ref: auto-output
          path: work
          fetch-depth: 0
          persist-credentials: false

      - name: Parse table.txt and download recent files
        run: |
          mkdir -p work/remote/files
          mkdir -p work/output

          table="main/table.txt"

          awk '
            {
              if (NR % 3 == 1) filename=$0;
              if (NR % 3 == 2) desc=$0;
              if (NR % 3 == 0) {
                time=$0;

                include=false;

                if (time ~ /hours ago/) include=true;
                if (time == "yesterday") include=true;
                if (time == "1 days ago") include=true;
                if (time == "2 days ago") include=true;
                if (time == "3 days ago") include=true;

                if (time == "last month") include=false;
                if (time == "last week") include=false;
                if (time == "last year") include=false;
                if (time ~ /weeks ago/) include=false;
                if (time ~ /months ago/) include=false;

                if (include == true) {
                  echo "包含: " filename " (" time ")";
                  curl -L "https://raw.githubusercontent.com/q1017673817/iptvz/main/"$filename \
                    -o "work/remote/files/$filename"
                } else {
                  echo "跳过: " filename " (" time ")";
                }
              }
            }
          ' "$table"

      - name: Merge selected files
        run: |
          > work/output/recent.txt

          if ls work/remote/files/*.txt >/dev/null 2>&1; then
            for f in work/remote/files/*.txt; do
              echo "==== 来自文件: $(basename "$f") ====" >> work/output/recent.txt
              cat "$f" >> work/output/recent.txt
              echo "" >> work/output/recent.txt
            done
          else
            echo "根据 table.txt，没有符合条件的文件" >> work/output/recent.txt
          fi

      - name: Push to auto-output branch
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd work
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add output/recent.txt

          if git diff --cached --quiet; then
            exit 0
          fi

          git commit -m "Update recent.txt based on manual table"
          git remote set-url origin https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.git
          git push -f origin auto-output
