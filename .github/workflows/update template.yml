name: Update template.m3u

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Download template
        run: |
          curl -L http://izihao.cn:7123/ -o template.m3u

          # ⭐ 模板替换成 mg000
          sed -i "s/izihao.cn:7123/mg000/g" template.m3u

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Auto update m3u files" || echo "No changes to commit"
          git push
